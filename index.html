<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator — Unit Converter & Physics Formulas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="liquid-blobs" aria-hidden="true">
    <span class="blob blob1"></span>
    <span class="blob blob2"></span>
    <span class="blob blob3"></span>
  </div>
  <div class="app">
    <header class="topbar">
      <h1>Smart Calculator</h1>
      <button id="themeToggle" class="theme-toggle" title="Toggle light/dark mode">🌙</button>
    </header>

    <nav class="tabs">
      <div class="tab-indicator" id="tabIndicator"><span class="tab-indicator-sheen"></span></div>
      <button class="tab-btn active" data-tab="converter"><span class="tab-icon">🔄</span><span class="tab-label">Unit Converter</span></button>
      <button class="tab-btn" data-tab="physics"><span class="tab-icon">🧪</span><span class="tab-label">Physics</span></button>
      <button class="tab-btn" data-tab="scientific"><span class="tab-icon">🧮</span><span class="tab-label">Scientific</span></button>
    </nav>

    <!-- ===== UNIT CONVERTER SECTION ===== -->
    <section id="converter" class="tab-panel active">
      <div class="card">
        <div class="field">
          <label for="category">Category</label>
          <select id="category"></select>
        </div>

        <div class="convert-row">
          <div class="field">
            <label for="fromValue">From</label>
            <input type="number" id="fromValue" value="1" />
            <select id="fromUnit"></select>
          </div>

          <button id="swapBtn" title="Swap units">&#8646;</button>

          <div class="field">
            <label for="toValue">To</label>
            <input type="number" id="toValue" readonly />
            <select id="toUnit"></select>
          </div>
        </div>

        <p class="result" id="resultText"></p>
      </div>
    </section>

    <!-- ===== PHYSICS FORMULAS SECTION ===== -->
    <section id="physics" class="tab-panel">
      <div class="card">
        <div class="field">
          <label for="formulaSelect">Formula</label>
          <select id="formulaSelect"></select>
        </div>

        <p class="formula-expr" id="formulaExpr"></p>

        <div class="field">
          <label for="solveForSelect">Solve for</label>
          <select id="solveForSelect"></select>
        </div>

        <div id="variableInputs" class="variable-inputs"></div>

        <button id="calcBtn" class="calc-btn">Calculate</button>

        <div class="physics-result" id="physicsResult"></div>
      </div>
    </section>

    <!-- ===== SCIENTIFIC CALCULATOR SECTION ===== -->
    <section id="scientific" class="tab-panel">
      <div class="card">
        <div class="calc-top">
          <button id="degRadToggle" class="deg-rad-toggle">DEG</button>
          <div class="calc-screen">
            <div class="calc-preview" id="calcPreview">&nbsp;</div>
            <input type="text" id="calcDisplay" class="calc-display" value="" placeholder="0" autocomplete="off" inputmode="none" />
          </div>
        </div>

        <div class="calc-grid">
          <button class="sci-btn btn-clear" data-action="ac">AC</button>
          <button class="sci-btn btn-clear" data-action="del">DEL</button>
          <button class="sci-btn btn-op" data-insert="%">%</button>
          <button class="sci-btn btn-op" data-action="negate">+/−</button>

          <button class="sci-btn btn-inv" id="invToggle" data-action="inv-toggle">INV</button>
          <button class="sci-btn btn-fn trig-btn" data-fn="sin">sin</button>
          <button class="sci-btn btn-fn trig-btn" data-fn="cos">cos</button>
          <button class="sci-btn btn-fn trig-btn" data-fn="tan">tan</button>

          <button class="sci-btn btn-fn" data-insert="log(">log</button>
          <button class="sci-btn btn-fn" data-insert="ln(">ln</button>
          <button class="sci-btn btn-fn" data-insert="√(">√</button>
          <button class="sci-btn btn-op" data-insert="^">^</button>

          <button class="sci-btn btn-fn" data-action="square">x²</button>
          <button class="sci-btn btn-fn" data-action="factorial">x!</button>
          <button class="sci-btn btn-fn" data-action="reciprocal">1/x</button>
          <button class="sci-btn btn-op" data-insert="(">(</button>

          <button class="sci-btn btn-op" data-insert=")">)</button>
          <button class="sci-btn btn-const" data-insert="π">π</button>
          <button class="sci-btn btn-const" data-insert="e">e</button>
          <button class="sci-btn btn-op" data-insert="/">÷</button>

          <button class="sci-btn" data-insert="7">7</button>
          <button class="sci-btn" data-insert="8">8</button>
          <button class="sci-btn" data-insert="9">9</button>
          <button class="sci-btn btn-op" data-insert="*">×</button>

          <button class="sci-btn" data-insert="4">4</button>
          <button class="sci-btn" data-insert="5">5</button>
          <button class="sci-btn" data-insert="6">6</button>
          <button class="sci-btn btn-op" data-insert="-">−</button>

          <button class="sci-btn" data-insert="1">1</button>
          <button class="sci-btn" data-insert="2">2</button>
          <button class="sci-btn" data-insert="3">3</button>
          <button class="sci-btn btn-op" data-insert="+">+</button>

          <button class="sci-btn" data-insert="0">0</button>
          <button class="sci-btn" data-insert=".">.</button>
          <button class="sci-btn btn-equals" data-action="equals">=</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
