<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Unit Converter</h1>

    <div class="field">
      <label for="category">Category</label>
      <select id="category"></select>
    </div>

    <div class="convert-row">
      <div class="field">
        <label for="fromValue">From</label>
        <input type="number" id="fromValue" value="1" />
        <select id="fromUnit"></select>
      </div>

      <button id="swapBtn" title="Swap units">&#8646;</button>

      <div class="field">
        <label for="toValue">To</label>
        <input type="number" id="toValue" readonly />
        <select id="toUnit"></select>
      </div>
    </div>

    <p class="result" id="resultText"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
